<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | ForensicForge</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="app-layout">
        <main class="main-content" style="padding: 0; min-height: 100vh;">
            <header class="header" style="padding: 24px 5%; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
                <div class="logo">
                    <a href="index.html" style="display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit;">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M14.5 4L20 9.5L18.5 11L13 5.5L14.5 4Z" fill="#a0aec0"/>
                            <path d="M13 5.5L18.5 11L9.5 20H4V14.5L13 5.5Z" fill="#e2e8f0"/>
                            <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(-45 12 12)" stroke="#00f5ff" stroke-width="1.5" stroke-dasharray="2 4" style="animation: spin-orbit 10s linear infinite; transform-origin: center;" />
                        </svg>
                        <span>ForensicForge</span>
                    </a>
                </div>
            </header>

            <div class="checkout-container">
                <div class="checkout-header">
                    <h1>Secure Checkout</h1>
                    <p>Complete your purchase to gain instant access to your precision templates.</p>
                </div>

                <div class="checkout-grid">
                    <div class="checkout-form-section">
                        <div class="form-card">
                            <h2 class="form-title">Payment Details</h2>
                            <form class="payment-form" onsubmit="event.preventDefault(); alert('Payment Successful! Templates unlocked.'); window.location.href='index.html';">
                                <div class="form-group">
                                    <label>Email Address</label>
                                    <input type="email" required placeholder="analyst@forensiclab.gov">
                                </div>
                                
                                <div class="form-group half-group-container">
                                    <div class="half-group">
                                        <label>First Name</label>
                                        <input type="text" required placeholder="Jane">
                                    </div>
                                    <div class="half-group">
                                        <label>Last Name</label>
                                        <input type="text" required placeholder="Doe">
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>Card Information</label>
                                    <div class="card-input-wrapper">
                                        <input type="text" required placeholder="0000 0000 0000 0000" maxlength="19">
                                        <div class="card-details">
                                            <input type="text" required placeholder="MM/YY" maxlength="5">
                                            <input type="text" required placeholder="CVC" maxlength="4">
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label>Name on Card</label>
                                    <input type="text" required placeholder="JANE DOE">
                                </div>

                                <button type="submit" class="submit-btn primary-btn" style="width: 100%; margin-top: 10px;">
                                    Confirm Payment — $29.00
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="checkout-summary-section">
                        <div class="summary-card">
                            <h2 class="form-title">Order Summary</h2>
                            
                            <div class="order-items">
                                <div class="item">
                                    <div class="item-icon">📄</div>
                                    <div class="item-details">
                                        <h4>Pro Template Pack</h4>
                                        <p>20 Premium Templates</p>
                                    </div>
                                    <div class="item-price">$29.00</div>
                                </div>
                            </div>

                            <div class="summary-totals">
                                <div class="total-row">
                                    <span>Subtotal</span>
                                    <span>$29.00</span>
                                </div>
                                <div class="total-row">
                                    <span>Tax</span>
                                    <span>$0.00</span>
                                </div>
                            </div>
                            
                            <div class="total-row final-total">
                                <span>Total Due</span>
                                <span class="highlight-price">$29.00</span>
                            </div>
                            
                            <div class="secure-badge">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                                256-bit Secure Encryption
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
